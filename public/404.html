<!DOCTYPE html>
<html lang="es">
<head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Error 404 - WeatherNow</title>
          <link rel="stylesheet" href="/css/styles.css">
          <style>
          /* =========================
          ESTILO 404 
          ========================= */
          body {
          display: flex;
          justify-content: center;
          align-items: center;
          flex-direction: column;
          min-height: 100vh;
          text-align: center;
          background: linear-gradient(135deg, #9da3a8, #82b8bb); /* degradado de la app */
          color: #fff; /* blanco para contraste */
          font-family: Arial, Helvetica, sans-serif;
          }

          h1 {
                    font-size: 80px;
                    color: #fff; /* blanco */
                    margin-bottom: 20px;
                    letter-spacing: 2px;
                    text-shadow: 2px 2px rgba(0,0,0,0.2);
          }

          h2 {
                    font-size: 28px;
                    color: #e0e0e0; /* gris claro */
                    margin-bottom: 30px;
          }

          .back-home {
                    padding: 14px 28px;
                    border-radius: 10px;
                    background: #495e75; 
                    color: #fff;
                    font-weight: bold;
                    font-size: 16px;
                    text-decoration: none;
                    transition: background-color 0.2s;
          }

          .back-home:hover {
                    background: #68798c; 
          }

          @media (max-width: 480px) {
                    h1 {
                    font-size: 50px;
                    }

                    h2 {
                    font-size: 22px;
                    }

                    .back-home {
                    font-size: 14px;
                    padding: 12px 24px;
                    }
          }
          </style>
</head>
<body>
          <h1>404</h1>
          <h2>Página no encontrada</h2>
          <a href="/" class="back-home">Volver al inicio</a>
</body>
</html>
